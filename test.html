<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

    .main{
        display: flex;
        width: 90%;
        margin: 100px auto;
        overflow-x: auto;
    }

    .main::-webkit-scrollbar{
        display: none;
    }
    
    
    .card{
        display: flex;
        justify-content: center;
        gap: 1em;
        align-items: center;
        animation: spin 5s infinite linear;
    }
    .box{
        flex: 0 0 5em;
        background-color: red;
        color: white;
        height: 5em;
        padding: 1em;
        margin-left: 20px;
       font-size: 3em;
       text-align: center;
       align-items: center;
    }

    @keyframes spin{
        from{translate: 0;}
        to{translate: -100%;}
    }
</style>
<body>
    <div class="main">
        <div class="card">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        </div>
         <div aria-hidden="true" class="card">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        </div>
    </div>
</body>
</html>
